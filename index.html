<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>if(localStorage.getItem('breadboard-theme')==='light')document.documentElement.dataset.theme='light'</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breadboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- ── Top bar (projects mode only) ──────────────────────────────────── -->
  <header id="topbar">
    <div id="app-logo" title="All Projects">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none">
        <rect x="1" y="5" width="16" height="8" rx="1.5" fill="#e8f5ed" stroke="#2d8a50" stroke-width="1.2"/>
        <circle cx="4"  cy="9" r="1.4" fill="#8a8478"/>
        <circle cx="7"  cy="9" r="1.4" fill="#8a8478"/>
        <circle cx="10" cy="9" r="1.4" fill="#8a8478"/>
        <circle cx="13" cy="9" r="1.4" fill="#8a8478"/>
        <line x1="1" y1="9" x2="4" y2="9" stroke="#0d99ff" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="4" y1="9" x2="7" y2="9" stroke="#0d99ff" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span id="app-name">Breadboard</span>
    </div>

    <span id="projects-topbar-title">All Projects</span>
    <div id="topbar-center"></div>

    <div id="topbar-right">
      <button id="import-project-btn">Import</button>
      <button id="new-project-btn">+ New project</button>
    </div>
  </header>

  <!-- ── Canvas app shell ──────────────────────────────────────────────── -->
  <div id="app">

    <!-- Left: logo menu, project menu, placed components, wires -->
    <aside id="sidebar">

      <!-- Logo menu button -->
      <button id="logo-menu-btn" class="sidebar-menu-btn">
        <svg width="14" height="14" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none;flex-shrink:0">
          <rect x="1" y="5" width="16" height="8" rx="1.5" fill="#e8f5ed" stroke="#2d8a50" stroke-width="1.2"/>
          <circle cx="4"  cy="9" r="1.4" fill="#8a8478"/>
          <circle cx="7"  cy="9" r="1.4" fill="#8a8478"/>
          <circle cx="10" cy="9" r="1.4" fill="#8a8478"/>
          <circle cx="13" cy="9" r="1.4" fill="#8a8478"/>
          <line x1="1" y1="9" x2="4" y2="9" stroke="#0d99ff" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="4" y1="9" x2="7" y2="9" stroke="#0d99ff" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <span class="sidebar-menu-label">Breadboard</span>
        <svg class="sidebar-menu-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="pointer-events:none;flex-shrink:0">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <!-- Project name menu button -->
      <button id="project-menu-btn" class="sidebar-menu-btn">
        <span id="project-name" class="sidebar-menu-label"></span>
        <svg class="sidebar-menu-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="pointer-events:none;flex-shrink:0">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <div class="sidebar-divider"></div>

      <div class="panel-label collapsible" id="components-label" style="padding-top:8px">Components</div>
      <ul id="layers-list"></ul>

      <div class="panel-label collapsible" id="wires-label">Jumpers</div>
      <ul id="wires-list"></ul>

    </aside>

    <div id="sidebar-resize-handle" title="Drag to resize"></div>

    <!-- Centre: canvas + floating action bar -->
    <main id="main">
      <div id="canvas-scroll-area">
        <div id="canvas-container"></div>
      </div>

      <!-- Insert popup (shown above action bar) -->
      <div id="insert-popup">
        <div id="insert-search-wrap">
          <input id="insert-search" type="text" placeholder="Search components…" autocomplete="off" spellcheck="false" />
          <button id="insert-search-clear" tabindex="-1" title="Clear">×</button>
        </div>
        <div id="insert-grid"></div>
      </div>

      <!-- Floating action bar -->
      <div id="action-bar">
        <button id="insert-btn">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="pointer-events:none">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Insert
        </button>
      </div>
    </main>

    <div id="layers-resize-handle" title="Drag to resize"></div>

    <!-- Right: zoom/theme controls, connections, BoM -->
    <aside id="layers-panel">

      <div id="right-controls">
        <button class="zoom-btn" id="theme-toggle" title="Toggle light/dark mode">
          <svg class="icon-sun" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="pointer-events:none">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="pointer-events:none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
        <div class="topbar-sep"></div>
        <button class="zoom-btn" id="zoom-out" title="Zoom out (−)">−</button>
        <span id="zoom-label" title="Reset zoom">100%</span>
        <button class="zoom-btn" id="zoom-in"  title="Zoom in (+)">+</button>
        <button class="zoom-btn" id="zoom-fit" title="Fit to screen">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="pointer-events:none">
            <path d="M1 4V1h3M8 1h3v3M11 8v3H8M4 11H1V8"/>
          </svg>
        </button>
      </div>

      <div class="panel-divider"></div>

      <div class="panel-label">Connections</div>
      <div id="table-inner"></div>

      <div class="panel-label collapsible" id="bom-label" style="display:none">Jumper BoM</div>
      <div id="bom-inner"></div>

    </aside>

  </div>

  <!-- ── Projects screen ───────────────────────────────────────────────── -->
  <div id="projects-screen">
    <div id="projects-grid"></div>
  </div>

  <!-- Shared overlays -->
  <div id="context-menu">
    <ul>
      <li id="ctx-rotate">Rotate</li>
      <li id="ctx-toggle-lock"></li>
    </ul>
  </div>

  <div id="color-picker"></div>

  <!-- Sidebar dropdown (logo menu & project menu) -->
  <div id="sidebar-dropdown">
    <ul id="sidebar-dropdown-list"></ul>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
