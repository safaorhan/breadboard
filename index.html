<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>if(localStorage.getItem('breadboard-theme')==='light')document.documentElement.dataset.theme='light'</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breadboard</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- ── Top bar (projects mode only) ──────────────────────────────────── -->
  <header id="topbar">
    <div id="app-logo" title="All Projects">
      <img src="/logo.svg" width="20" height="20" alt="Breadboard" style="pointer-events:none" />
      <span id="app-name">Breadboard</span>
    </div>

    <span id="projects-topbar-title">All Projects</span>
    <div id="topbar-center"></div>

    <div id="topbar-right">
      <button id="import-project-btn">Import</button>
      <button id="new-project-btn">+ New project</button>
    </div>
  </header>

  <!-- ── Canvas app shell ──────────────────────────────────────────────── -->
  <div id="app">

    <!-- Left: logo menu, project menu, placed components, wires -->
    <aside id="sidebar">

      <!-- Logo button: icon + chevron only -->
      <div id="sidebar-topbar">
        <button id="logo-menu-btn" aria-label="Main menu" aria-haspopup="menu">
          <img src="/logo.svg" width="18" height="18" alt="" style="pointer-events:none;flex-shrink:0" />
          <svg width="14" height="14" viewBox="0 0 16 16" style="pointer-events:none;flex-shrink:0"><use href="#icon-chevron"/></svg>
        </button>
      </div>

      <!-- Project name row: click name to rename, click chevron for menu -->
      <div id="sidebar-project-row">
        <button id="project-name-btn" title="Click to rename">
          <span id="project-name"></span>
          <input id="project-name-input" type="text" spellcheck="false" autocomplete="off" maxlength="100" />
        </button>
        <button id="project-menu-btn" aria-label="Edit file menu" aria-haspopup="menu">
          <svg width="12" height="12" viewBox="0 0 16 16" style="pointer-events:none"><use href="#icon-chevron"/></svg>
        </button>
      </div>

      <div class="sidebar-divider"></div>

      <div class="panel-label collapsible" id="components-label"><span class="label-text">Components</span></div>
      <ul id="layers-list"></ul>

      <div class="sidebar-divider"></div>

      <div class="panel-label collapsible" id="wires-label"><span class="label-text">Jumpers</span></div>
      <ul id="wires-list"></ul>

    </aside>

    <div id="sidebar-resize-handle" title="Drag to resize"></div>

    <!-- Centre: canvas + floating action bar -->
    <main id="main">
      <div id="canvas-scroll-area">
        <div id="canvas-container"></div>
      </div>

      <!-- Insert popup (shown above action bar) -->
      <div id="insert-popup">
        <div id="insert-search-wrap">
          <input id="insert-search" type="text" placeholder="Search components…" autocomplete="off" spellcheck="false" />
          <button id="insert-search-clear" tabindex="-1" title="Clear">×</button>
        </div>
        <div id="insert-grid"></div>
      </div>

      <!-- Floating action bar -->
      <div id="action-bar">
        <button id="insert-btn">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="pointer-events:none">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Insert
        </button>
      </div>
    </main>

    <div id="layers-resize-handle" title="Drag to resize"></div>

    <!-- Right: zoom/theme controls, connections, BoM -->
    <aside id="layers-panel">

      <div id="right-controls">
        <button class="zoom-btn" id="theme-toggle" title="Toggle light/dark mode">
          <svg class="icon-sun" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="pointer-events:none">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="pointer-events:none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
        <div class="topbar-sep"></div>
        <button class="zoom-btn" id="zoom-out" title="Zoom out (−)">−</button>
        <span id="zoom-label" title="Reset zoom">100%</span>
        <button class="zoom-btn" id="zoom-in"  title="Zoom in (+)">+</button>
        <button class="zoom-btn" id="zoom-fit" title="Fit to screen">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="pointer-events:none">
            <path d="M1 4V1h3M8 1h3v3M11 8v3H8M4 11H1V8"/>
          </svg>
        </button>
      </div>

      <div class="panel-divider"></div>

      <div class="panel-label collapsible" id="connections-label"><span class="label-text">Connections</span></div>
      <div id="table-inner"></div>

      <div class="panel-divider"></div>

      <div class="panel-label collapsible" id="bom-label" style="display:none"><span class="label-text">Jumper BoM</span></div>
      <div id="bom-inner"></div>

    </aside>

  </div>

  <!-- ── Projects screen ───────────────────────────────────────────────── -->
  <div id="projects-screen">
    <div id="projects-grid"></div>
  </div>

  <!-- Shared overlays -->
  <div id="context-menu">
    <ul>
      <li id="ctx-rotate">Rotate</li>
      <li id="ctx-toggle-lock"></li>
    </ul>
  </div>

  <div id="color-picker"></div>

  <!-- Sidebar dropdown (logo menu & project menu) -->
  <div id="sidebar-dropdown">
    <ul id="sidebar-dropdown-list"></ul>
  </div>

  <!-- Shared icon definitions -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <symbol id="icon-chevron" viewBox="0 0 16 16">
      <path fill="currentColor" d="M9.768 6.768a.5.5 0 0 1 .707.707l-2.12 2.121a.5.5 0 0 1-.708 0L5.525 7.475a.5.5 0 0 1 .708-.707l1.768 1.767z"/>
    </symbol>
    <symbol id="icon-x" viewBox="0 0 24 24">
      <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </svg>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
